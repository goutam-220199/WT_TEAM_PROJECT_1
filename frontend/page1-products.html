<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - InventoryPro</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <h1 class="logo">InventoryPro</h1>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="page1-dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="page1-products.html" class="nav-link active">Products</a></li>
                <li><a href="page1-orders.html" class="nav-link">Orders</a></li>
                <li><a href="page1-sales.html" class="nav-link">Sales Invoice</a></li>
                <li><a href="page1-reports.html" class="nav-link">Reports</a></li>
                <li><a href="page1-notifications.html" class="nav-link">Notifications</a></li>
                <li><a href="index.html" class="nav-link" onclick="logout(event)">Logout</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="products-container">
            <div class="page-header">
                <div class="header-content">
                    <h2>Product Management</h2>
                    <div class="user-info" id="userInfo">
                        <span id="userName"></span> (<span id="userRole"></span>)
                    </div>
                </div>
                <button class="btn btn-primary" onclick="openProductModal()">Add Product</button>
            </div>

            <div class="products-grid" id="productsGrid">
                <p class="empty-state">No products added yet. Click "Add Product" to get started.</p>
            </div>
        </div>
    </main>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeProductModal()">&times;</span>
            <h2 id="modalTitle">Add Product</h2>
            
            <form id="productForm">
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" required>
                </div>

                <div class="form-group">
                    <label for="productPrice">Price</label>
                    <input type="number" id="productPrice" step="0.01" required>
                </div>

                <div class="form-group">
                    <label for="productGST">GST %</label>
                    <input type="number" id="productGST" step="0.01" value="18" required>
                </div>

                <div class="form-group">
                    <label for="productQuantity">Quantity</label>
                    <input type="number" id="productQuantity" required>
                </div>

                <div class="form-group">
                    <label for="productDescription">Description</label>
                    <textarea id="productDescription" rows="3"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Save Product</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/page1-products.js"></script>
</body>
</html>
