    <main class="main-content">
        <div class="products-container">
            <div class="page-header">
                <div class="header-content">
                    <h2>Product Management</h2>
                    <div class="user-info" id="userInfo">
                        <span id="userName"></span> (<span id="userRole"></span>)
                    </div>
                </div>
                <button class="btn btn-primary" onclick="openProductModal()">Add Product</button>
            </div>

            <div class="category-container" id="productsGrid">
                <p class="empty-state">No products added yet. Click "Add Product" to get started.</p>
            </div>
        </div>
    </main>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeProductModal()">&times;</span>
            <h2 id="modalTitle">Add Product</h2>
            
            <form id="productForm">
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" required>
                </div>

                <div class="form-group">
                    <label for="productCategory">Category</label>
                    <input type="text" id="productCategory" required>
                </div>

                <div class="form-group">
                    <label for="productPrice">Price</label>
                    <input type="number" id="productPrice" step="0.01" required>
                </div>

                <div class="form-group">
                    <label for="productGST">GST %</label>
                    <input type="number" id="productGST" step="0.01" value="18" required>
                </div>

                <div class="form-group">
                    <label for="productQuantity">Quantity</label>
                    <input type="number" id="productQuantity" required>
                </div>

                <div class="form-group">
                    <label for="productDescription">Description</label>
                    <textarea id="productDescription" rows="3"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Save Product</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/page1-products.js"></script>
</body>
</html>
