</head>
<body>

        <div class="navbar-container">
            <div class="navbar-logo">
                <h1 class="logo">InventoryPro</h1>

                <li><a href="page2-dashboard.html" class="nav-link">Dashboard</a></li>

                <li><a href="page2-suppliers.html" class="nav-link">Suppliers</a></li>
                <li><a href="page2-purchase.html" class="nav-link active">Purchase Invoice</a></li>
                <li><a href="page2-cart.html" class="nav-link">Cart<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-cart" viewBox="0 0 16 16">
  <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M3.102 4l1.313 7h8.17l1.313-7zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2m7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2"/>
</svg></a></li>
                <li><a href="page2-invoices.html" class="nav-link">Previous Invoices</a></li>

            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="purchase-container">
            <div class="page-header">
                <h2>Create Purchase Invoice</h2>
            </div>


            <div class="purchase-form">
                <div class="form-section">
                    <h3>Purchase Details</h3>
                    
                    <div class="form-group">
                        <label for="purchaseDate">Invoice Date</label>
                        <input type="date" id="purchaseDate" required>
                    </div>

                    <div class="form-group">
                        <label for="supplierSelect">Select Supplier</label>
                        <select id="supplierSelect" onchange="Purchase.loadSupplierProducts(this.value)" required>
                            <option value="">Choose a supplier</option>
                        </select>
                    </div>

                    <h3 style="margin-top: 20px;">Add Products</h3>

                    <div class="products-list" id="purchaseProductsList">
                        <div class="product-row">
                            <select class="product-select" onchange="updateProductPrice(this)">
                                <option value="">Select Product</option>
                            </select>
                            <input type="number" class="product-qty" placeholder="Qty" min="1" onchange="calculatePurchaseTotal()">
                            <input type="number" class="product-price" placeholder="Price" readonly>
                            <input type="number" class="product-gst" placeholder="GST %" readonly>
                            <button type="button" class="btn btn-delete" onclick="removeProductRow(this)">Remove</button>
                        </div>
                    </div>

                    <button type="button" class="btn btn-secondary" onclick="addPurchaseProductRow()">Add Product Row</button>

                    <div class="invoice-summary">
                        <div class="summary-row">
                            <span>Subtotal:</span>
                            <span id="purchaseSubtotal">₹0</span>
                        </div>
                        <div class="summary-row">
                            <span>GST:</span>
                            <span id="purchaseGST">₹0</span>
                        </div>
                        <div class="summary-row total">
                            <span>Total Amount:</span>
                            <span id="purchaseTotalAmount">₹0</span>
                        </div>
                    </div>

                    <button type="button" class="btn btn-primary" onclick="createPurchaseInvoice()">Create Invoice</button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/page2-purchase.js"></script>
</body>
</html>
