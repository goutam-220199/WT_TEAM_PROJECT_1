<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - InventoryPro</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <h1 class="logo">InventoryPro</h1>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="page1-dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="page1-products.html" class="nav-link">Products</a></li>
                <li><a href="page1-orders.html" class="nav-link active">Orders</a></li>
                <li><a href="page1-sales.html" class="nav-link">Sales Invoice</a></li>
                <li><a href="page1-reports.html" class="nav-link">Reports</a></li>
                <li><a href="page1-notifications.html" class="nav-link">Notifications</a></li>
                <li><a href="index.html" class="nav-link" onclick="logout(event)">Logout</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="orders-container">
            <div class="page-header">
                <h2>Orders from Retailers & Small Business Owners</h2>
            </div>

            <div class="orders-section">
                <div class="orders-column">
                    <h3>Pending Orders</h3>
                    <div id="pendingOrdersGrid" class="orders-grid">
                        <p class="empty-state">No pending orders</p>
                    </div>
                </div>
                <div class="orders-column">
                    <h3>Approved Orders</h3>
                    <div id="approvedOrdersGrid" class="orders-grid">
                        <p class="empty-state">No approved orders</p>
                    </div>
                </div>
                <div class="orders-column">
                    <h3>Rejected Orders</h3>
                    <div id="rejectedOrdersGrid" class="orders-grid">
                        <p class="empty-state">No rejected orders</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/page1-orders.js"></script>
</body>
</html>
