<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - InventoryPro</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <h1 class="logo">InventoryPro</h1>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="page2-dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="page2-suppliers.html" class="nav-link">Suppliers</a></li>
                <li><a href="page2-purchase.html" class="nav-link">Purchase Invoice</a></li>
                <li><a href="page2-cart.html" class="nav-link active">Cart</a></li>
                <li><a href="page2-invoices.html" class="nav-link">Previous Invoices</a></li>
                <li><a href="index.html" class="nav-link" onclick="logout(event)">Logout</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="cart-container">
            <div class="page-header">
                <h2>Your Cart</h2>
                <p class="subtitle">Review items and place order to submit request to supplier.</p>
            </div>

            <div class="cart-table" id="cartTable">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Qty</th>
                            <th>Price</th>
                            <th>GST</th>
                            <th>Total</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="cartBody">
                        <tr>
                            <td colspan="6" class="empty-state">Your cart is empty.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="cart-summary">
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="cartSubtotal">₹0</span>
                </div>
                <div class="summary-row">
                    <span>GST:</span>
                    <span id="cartGst">₹0</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="cartTotal">₹0</span>
                </div>
                <button class="btn btn-primary" id="checkoutBtn">Place Order</button>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/page2-cart.js"></script>
</body>
</html>
