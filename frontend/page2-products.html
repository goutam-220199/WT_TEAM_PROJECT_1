<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - InventoryPro</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .category-section {
            margin-bottom: 40px;
        }
        .category-title {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #3498db;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <h1 class="logo">InventoryPro</h1>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="page2-dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="page2-products.html" class="nav-link active">Products</a></li>
                <li><a href="page2-suppliers.html" class="nav-link">Suppliers</a></li>
                <li><a href="page2-cart.html" class="nav-link">Cart</a></li>
                <li><a href="page2-invoices.html" class="nav-link">Previous Invoices</a></li>
                <li><a href="index.html" class="nav-link" onclick="logout(event)">Logout</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="products-container" id="productsContainer">
            <div class="page-header">
                <h2>Product Directory</h2>
                <p>Browse products by category</p>
            </div>
            
            <div id="categorizedProducts">
                <p class="empty-state">Loading products...</p>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/page2-products.js"></script>
</body>
</html>
